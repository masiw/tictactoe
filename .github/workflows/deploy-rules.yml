name: Deploy Firebase rules

on:
  push:
    branches: [main]
    paths:
      - 'database.rules.json'
      - 'firebase.json'
      - '.github/workflows/deploy-rules.yml'
  workflow_dispatch:

jobs:
  deploy-rules:
    name: deploy database rules
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Firebase CLI
        run: npm install -g firebase-tools

      - name: Write service account credentials
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: |
          printf '%s' "$FIREBASE_SERVICE_ACCOUNT" > "$RUNNER_TEMP/sa.json"
          echo "GOOGLE_APPLICATION_CREDENTIALS=$RUNNER_TEMP/sa.json" >> "$GITHUB_ENV"

      - name: Deploy database rules
        run: firebase deploy --only database --project "${{ secrets.FIREBASE_PROJECT_ID }}" --non-interactive
